<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Narciso Cabal</title>
    <style>
        :root { --admin: #1e293b; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .admin-card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
        h2 { color: var(--admin); text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #475569; }
        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        button { background: var(--admin); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 1.1rem; }
        button:hover { background: #334155; }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>⚙️ Gestión de Salas</h2>
        
        <label>Nombre de la Sala (ej: 9A-Estadistica)</label>
        <input type="text" id="admin-sala" placeholder="Nombre único de la sala">

        <label>Palabra Secreta</label>
        <input type="text" id="admin-palabra" placeholder="Ej: POLINOMIO">

        <label>Nivel de Retos Matemáticos</label>
        <select id="admin-nivel">
            <option value="8">8° Grado (Álgebra Básica)</option>
            <option value="9">9° Grado (Sistemas y Geometría)</option>
        </select>

        <button id="btn-crear">CREAR PARTIDA</button>
        <div id="msg" class="status"></div>
    </div>

    <script type="module">
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";
        import { app } from './firebase-config.js'; 

        const db = getDatabase();

        document.getElementById('btn-crear').onclick = async () => {
            const sala = document.getElementById('admin-sala').value.trim().toLowerCase();
            const palabra = document.getElementById('admin-palabra').value.trim().toUpperCase();
            const nivel = document.getElementById('admin-nivel').value;
            const msg = document.getElementById('msg');

            if(!sala || !palabra) return alert("Héctor, completa todos los campos.");

            try {
                await set(ref(db, `sesiones/${sala}`), {
                    palabra_actual: palabra,
                    letras_adivinadas: [""],
                    errores: 0,
                    turno_de: "Esperando...",
                    estado: "jugando",
                    nivel: nivel,
                    creada_el: new Date().toISOString()
                });

                msg.style.display = "block";
                msg.style.backgroundColor = "#dcfce7";
                msg.style.color = "#166534";
                msg.innerText = `✅ Sala "${sala}" creada con éxito.`;
                
                // Limpiar campos
                document.getElementById('admin-palabra').value = "";
            } catch (e) {
                alert("Error al crear la sala.");
            }
        };
    </script>
</body>
</html>
