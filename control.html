<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Estudiante - Narciso Cabal</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 380px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 10px; box-sizing: border-box; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 1.1rem; box-sizing: border-box; }
        button { background: #2563eb; color: white; font-weight: bold; border: none; cursor: pointer; }
        .hidden { display: none; }
        .math { background: #eff6ff; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .keyboard { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 15px; }
        .k-btn { padding: 10px 5px; border: none; background: #e2e8f0; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .k-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="step-join" class="card">
        <h2 style="text-align: center;">Unirse a Sala</h2>
        <input type="text" id="in-sala" placeholder="Nombre de la Sala">
        <input type="text" id="in-nombre" placeholder="Nombre de tu Equipo">
        <button id="btn-entrar">UNIRSE AL EQUIPO</button>
    </div>

    <div id="step-math" class="card hidden">
        <h3 style="text-align: center;">Validación Matemática</h3>
        <p style="text-align: center; font-size: 0.9rem; color: #666;">Resuelve el reto para desbloquear el teclado</p>
        <div class="math" id="txt-pregunta"></div>
        <input type="number" id="in-ans" placeholder="Tu respuesta">
        <button id="btn-check">COMPROBAR</button>
    </div>

    <div id="step-game" class="card hidden">
        <p id="txt-turno" style="text-align:center; font-weight:bold; font-size: 1.2rem;"></p>
        <div class="keyboard" id="teclado"></div>
    </div>

    <script type="module">
        // 1. Importamos funciones de Firebase desde la CDN
        import { ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";
        
        // 2. Importamos NUESTRA conexión a la base de datos
        import { db } from './firebase-config.js';

        let miSala = "", miNombre = "", miData = {};
        
        // Retos matemáticos iniciales para 8vo/9no
        const retos = [
            {q:"Si 2x + 4 = 12, ¿cuál es el valor de x?", a:4}, 
            {q:"Resuelve: 3x - 5 = 10", a:5}, 
            {q:"Calcula: √81 + 1", a:10}, 
            {q:"¿Cuál es la mediana de los números 2, 3 y 4?", a:3}
        ];

        document.getElementById('btn-entrar').onclick = async () => {
            miSala = document.getElementById('in-sala').value.trim().toLowerCase();
            miNombre = document.getElementById('in-nombre').value.trim();
            
            if(!miSala || !miNombre) return alert("Completa todos los campos");

            try {
                const snap = await get(ref(db, `sesiones/${miSala}`));
                if(!snap.exists()) return alert("La sala no existe. Pide al profesor que inicie el tablero primero.");
                
                let data = snap.val();
                let jugadores = data.jugadores || {};
                
                if(Object.keys(jugadores).length >= 3) return alert("La sala ya está llena (máximo 3 equipos).");
                if(jugadores[miNombre]) return alert("Ese nombre de equipo ya está en uso.");

                jugadores[miNombre] = true;
                const orden = Object.keys(jugadores).sort(); // ALFABÉTICO

                await update(ref(db, `sesiones/${miSala}`), { 
                    jugadores: jugadores, 
                    orden_turnos: orden 
                });

                document.getElementById('step-join').classList.add('hidden');
                activarEscucha();
                prepararReto();

            } catch (error) {
                console.error("Error al unirse:", error);
                alert("Hubo un problema al conectarse a la sala.");
            }
        };

        function activarEscucha() {
            onValue(ref(db, `sesiones/${miSala}`), (snap) => {
                miData = snap.val();
                if(!miData || !miData.orden_turnos) return;

                const esMiTurno = miData.orden_turnos[miData.turno_index] === miNombre;
                
                const txtTurno = document.getElementById('txt-turno');
                if (esMiTurno) {
                    txtTurno.innerText = "🎯 ¡ES TU TURNO!";
                    txtTurno.style.color = "#2563eb";
                } else {
                    txtTurno.innerText = `⏳ Esperando... Turno de: ${miData.orden_turnos[miData.turno_index]}`;
                    txtTurno.style.color = "#64748b";
                }
                
                actualizarTeclado(esMiTurno);

                // Si el juego terminó, ocultar teclado
                if(miData.estado !== "jugando") {
                    document.getElementById('step-game').classList.add('hidden');
                }
            });
        }

        function prepararReto() {
            const r = retos[Math.floor(Math.random()*retos.length)];
            document.getElementById('txt-pregunta').innerText = r.q;
            document.getElementById('txt-pregunta').dataset.a = r.a;
            document.getElementById('in-ans').value = ""; // Limpiar input
            document.getElementById('step-math').classList.remove('hidden');
            document.getElementById('step-game').classList.add('hidden');
        }

        document.getElementById('btn-check').onclick = () => {
            const respuestaUsuario = document.getElementById('in-ans').value;
            const respuestaCorrecta = document.getElementById('txt-pregunta').dataset.a;
            
            if(respuestaUsuario === respuestaCorrecta) {
                document.getElementById('step-math').classList.add('hidden');
                document.getElementById('step-game').classList.remove('hidden');
            } else { 
                alert("❌ Respuesta incorrecta. Intenta con un nuevo reto."); 
                prepararReto(); 
            }
        };

        function actualizarTeclado(activo) {
            const cont = document.getElementById('teclado');
            cont.innerHTML = "";
            "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement('button');
                b.className = "k-btn"; 
                b.innerText = l;
                
                // Desactiva la letra si no es mi turno, o si la letra ya se jugó
                b.disabled = !activo || (miData.letras_adivinadas || []).includes(l);
                
                b.onclick = () => enviarLetra(l);
                cont.appendChild(b);
            });
        }

        async function enviarLetra(l) {
            let acierto = miData.palabra_actual.includes(l);
            let nuevosErrores = miData.errores + (acierto ? 0 : 1);
            let nuevoIndex = miData.turno_index;
            
            // Si falla, pasa al siguiente equipo
            if(!acierto) {
                nuevoIndex = (miData.turno_index + 1) % miData.orden_turnos.length;
            }

            await update(ref(db, `sesiones/${miSala}`), {
                letras_adivinadas: [...(miData.letras_adivinadas || []), l],
                errores: nuevosErrores,
                turno_index: nuevoIndex
            });
            
            // Después de jugar una letra, vuelve al reto matemático
            prepararReto();
        }
    </script>
</body>
</html>
