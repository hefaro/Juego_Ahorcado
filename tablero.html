<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Pro - Narciso Cabal</title>
    <style>
        :root { --primary: #0f172a; --accent: #38bdf8; --error: #ef4444; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .setup-box { background: #1e293b; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; max-width: 400px; }
        .game-container { display: none; width: 100%; max-width: 900px; text-align: center; }
        input, button { padding: 12px; border-radius: 8px; border: none; font-size: 1rem; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: var(--primary); font-weight: bold; cursor: pointer; }
        .word-box { font-size: 4.5rem; letter-spacing: 15px; margin: 30px 0; font-family: monospace; }
        .player-list { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .player-card { padding: 10px 20px; background: #334155; border-radius: 10px; border-bottom: 4px solid transparent; transition: all 0.3s ease; }
        .active-turn { border-color: var(--accent); background: #475569; transform: scale(1.1); }
        #canvas { background: white; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="view-setup" class="setup-box">
        <h2 style="color:var(--accent)">Configurar Nueva Sala</h2>
        <p>Institución Educativa Narciso Cabal</p>
        <input type="text" id="setup-sala" placeholder="Nombre de la Sala (ej: 8A)">
        <button id="btn-crear">INICIALIZAR TABLERO</button>
    </div>

    <div id="view-game" class="game-container">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 id="display-sala" style="color:var(--accent)">SALA: -</h3>
            <div id="display-errores" style="color:var(--error); font-weight:bold; font-size: 1.5rem;">Errores: 0/6</div>
        </div>

        <canvas id="canvas" width="200" height="220"></canvas>
        <div class="word-box" id="display-palabra">_ _ _ _ _</div>
        
        <div class="player-list" id="contenedor-jugadores"></div>
    </div>

    <script type="module">
        // Importamos solo las funciones de la CDN
        import { ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";
        
        // Importamos la conexión (db) y la función de historial desde nuestro archivo
        import { registrarResultado, db } from './firebase-config.js';

        const bancoPalabras = ["POLINOMIO", "HIPOTENUSA", "LOGARITMO", "ESTADISTICA", "GEOMETRIA", "ALGEBRA", "FACTORIZACION", "PENDIENTE", "RADICACION", "TEOREMA"];
        
        let salaID = "";
        const ctx = document.getElementById('canvas').getContext('2d');

        document.getElementById('btn-crear').onclick = async () => {
            salaID = document.getElementById('setup-sala').value.trim().toLowerCase();
            if(!salaID) return alert("Por favor, escribe un nombre de sala.");

            const palabra = bancoPalabras[Math.floor(Math.random() * bancoPalabras.length)];
            
            await set(ref(db, `sesiones/${salaID}`), {
                palabra_actual: palabra,
                letras_adivinadas: [""],
                errores: 0,
                estado: "jugando",
                jugadores: {}, // Se llenará cuando el control se conecte
                orden_turnos: [],
                turno_index: 0
            });

            document.getElementById('view-setup').style.display = "none";
            document.getElementById('view-game').style.display = "block";
            iniciarEscucha();
        };

        function iniciarEscucha() {
            onValue(ref(db, `sesiones/${salaID}`), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                document.getElementById('display-sala').innerText = `SALA: ${salaID.toUpperCase()}`;
                document.getElementById('display-errores').innerText = `Errores: ${data.errores}/6`;
                
                // Dibujar palabra
                let visual = "";
                for(let l of data.palabra_actual) visual += (data.letras_adivinadas.includes(l) ? l : "_") + " ";
                document.getElementById('display-palabra').innerText = visual;

                // Dibujar jugadores y resaltar turno
                const pCont = document.getElementById('contenedor-jugadores');
                pCont.innerHTML = "";
                const listaNombres = data.orden_turnos || [];
                
                listaNombres.forEach((nombre, i) => {
                    const card = document.createElement('div');
                    card.className = `player-card ${i === data.turno_index ? 'active-turn' : ''}`;
                    card.innerText = nombre.toUpperCase();
                    pCont.appendChild(card);
                });

                dibujar(data.errores);

                // Lógica de fin de juego
                if(!visual.includes("_") && data.estado === "jugando") {
                    update(ref(db, `sesiones/${salaID}`), { estado: "victoria" });
                    alert("¡VICTORIA!");
                    // Aquí podrías llamar a registrarResultado() para el equipo ganador
                } else if(data.errores >= 6 && data.estado === "jugando") {
                    update(ref(db, `sesiones/${salaID}`), { estado: "derrota" });
                    alert("AHORCADO. La palabra era: " + data.palabra_actual);
                }
            });
        }

        function dibujar(e) {
            ctx.clearRect(0,0,200,220); ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(10,210); ctx.lineTo(150,210); ctx.moveTo(30,210); ctx.lineTo(30,10); ctx.lineTo(120,10); ctx.lineTo(120,40); ctx.stroke();
            if(e>0) { ctx.beginPath(); ctx.arc(120,60,20,0,Math.PI*2); ctx.stroke(); } // Cabeza
            if(e>1) { ctx.beginPath(); ctx.moveTo(120,80); ctx.lineTo(120,150); ctx.stroke(); } // Cuerpo
            if(e>2) { ctx.beginPath(); ctx.moveTo(120,100); ctx.lineTo(90,130); ctx.stroke(); } // B. Izq
            if(e>3) { ctx.beginPath(); ctx.moveTo(120,100); ctx.lineTo(150,130); ctx.stroke(); } // B. Der
            if(e>4) { ctx.beginPath(); ctx.moveTo(120,150); ctx.lineTo(90,190); ctx.stroke(); } // P. Izq
            if(e>5) { ctx.beginPath(); ctx.moveTo(120,150); ctx.lineTo(150,190); ctx.stroke(); } // P. Der
        }
    </script>
</body>
</html>
