<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahorcado Matemático - Narciso Cabal</title>
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #2563eb; 
            --bg: #f8fafc; 
            --text: #334155;
            --error: #ef4444; 
            --success: #22c55e; 
        }

        /* Ajuste para que el juego siempre ocupe el alto visible real */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; /* Altura dinámica para móviles */
            overflow: hidden; 
        }
        
        .pantalla { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
        }
        .pantalla.activa { display: flex; }
        
        #pantalla-inicio { padding: 20px; justify-content: center; align-items: center; text-align: center; box-sizing: border-box; }
        
        .game-header { 
            background: var(--primary); 
            color: white; 
            padding: 10px 15px; 
            text-align: center; 
            flex-shrink: 0;
        }

        /* SOLUCIÓN AL DESBORDE: Ahora las letras pueden bajar de línea si no caben */
        .word-box { 
            font-size: clamp(1.5rem, 7vw, 2.2rem); 
            margin: 10px 0; 
            font-family: 'Courier New', monospace; 
            font-weight: bold; 
            color: #38bdf8; 
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 8px;
        }
        
        .turn-box { font-size: 1rem; padding: 5px; border-radius: 5px; margin-top: 5px; font-weight: bold; }
        .mi-turno { background: var(--success); color: white; }

        .game-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
        }

        .tab-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        .tab-content.activa { display: flex; }

        #canvas { 
            max-width: 100%; 
            height: auto; 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px;
        }

        .math-box { background: #eff6ff; padding: 15px; border-radius: 12px; border: 1px solid #bfdbfe; width: 100%; box-sizing: border-box; }
        
        .keyboard { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 4px; 
            width: 100%; 
            margin-top: 10px;
        }
        .k-btn { padding: 12px 0; border: none; background: #f1f5f9; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .k-btn:disabled { opacity: 0.3; }

        /* Botones de navegación subidos y más compactos */
        .bottom-nav { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #e2e8f0; 
            padding-bottom: env(safe-area-inset-bottom); /* Evita botones bajo barra de iPhone */
            flex-shrink: 0;
        }
        .nav-btn { 
            flex: 1; 
            padding: 12px; 
            background: none; 
            border: none; 
            font-weight: bold; 
            color: #64748b; 
            border-bottom: 3px solid transparent;
        }
        .nav-btn.activo { color: var(--accent); border-bottom-color: var(--accent); }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; }
        .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="pantalla activa">
        <div style="width:100%">
            <h2 style="margin:0; color: var(--primary);">Ahorcado Matemático v5</h2>
            <p style="margin:5px 0 20px; color: #64748b;">Narciso Cabal Salcedo</p>
            <input type="text" id="in-sala" placeholder="Código de la Sala">
            <input type="text" id="in-equipo" placeholder="Nombre de tu Equipo">
            <button id="btn-unir" class="btn-main">ENTRAR</button>
            <button id="btn-crear" class="btn-main" style="background:#64748b; margin-top:10px;">CREAR SALA</button>
        </div>
    </div>

    <div id="pantalla-juego" class="pantalla">
        <div class="game-header">
            <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
                <span id="lbl-sala">SALA: --</span>
                <span id="lbl-errores" style="color: #fca5a5;">Errores: 0/6</span>
            </div>
            <div class="word-box" id="display-palabra"></div>
            <div class="turn-box" id="display-turno">Cargando...</div>
        </div>

        <div class="game-content">
            <div id="vista-tablero" class="tab-content activa">
                <canvas id="canvas" width="200" height="180"></canvas>
                <div id="contenedor-jugadores" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
            </div>

            <div id="vista-controles" class="tab-content">
                <div id="caja-reto" class="math-box">
                    <div id="txt-pregunta" style="font-weight:bold; margin-bottom:10px;">--</div>
                    <input type="number" inputmode="numeric" id="in-ans" placeholder="Respuesta">
                    <button id="btn-check" class="btn-main">LISTO</button>
                </div>
                <div id="caja-teclado" style="display:none; width:100%;">
                    <div class="keyboard" id="teclado"></div>
                    <input type="text" id="in-arriesgar" placeholder="¿Sabes la palabra?" style="margin-top:15px;">
                    <button id="btn-arriesgar" class="btn-main" style="background:#f59e0b;">ARRIESGAR</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn activo" id="btn-nav-tablero">TABLERO</button>
            <button class="nav-btn" id="btn-nav-jugar">JUGAR</button>
        </div>
    </div>

    <script type="module">
        import { ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";
        import { db } from './firebase-config.js';

        // --- SISTEMA DE SONIDO ---
        const sonido = {
            play(freq, type, dur) {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = type; o.frequency.value = freq;
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + dur);
            },
            exito() { this.play(880, 'square', 0.2); },
            error() { this.play(150, 'sawtooth', 0.3); },
            victoria() { this.play(523, 'sine', 0.2); setTimeout(()=>this.play(659, 'sine', 0.4), 150); }
        };

        const banco = ["POLINOMIO", "HIPOTENUSA", "ALGEBRA", "GEOMETRIA", "ESTADISTICA", "FRACCION", "RADICACION", "TEOREMA"];
        const retos = [
            {q: "¿Raíz cuadrada de 81?", a: 9},
            {q: "Si x + 5 = 12, ¿x?", a: 7},
            {q: "3 x 3 x 3 =", a: 27},
            {q: "Lados de un dodecágono", a: 12},
            {q: "15% de 200", a: 30}
        ];

        let miSala = "", miEquipo = "", miData = {};
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // --- NAVEGACIÓN ---
        document.getElementById('btn-nav-tablero').onclick = () =>切换Tab('tablero');
        document.getElementById('btn-nav-jugar').onclick = () =>切换Tab('controles');

        function 切换Tab(vista) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('activa'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('activo'));
            document.getElementById('vista-' + vista).classList.add('activa');
            if(vista === 'tablero') document.getElementById('btn-nav-tablero').classList.add('activo');
            else document.getElementById('btn-nav-jugar').classList.add('activo');
        }

        // --- LÓGICA DE INICIO ---
        document.getElementById('btn-crear').onclick = async () => {
            miSala = document.getElementById('in-sala').value.trim().toLowerCase();
            miEquipo = document.getElementById('in-equipo').value.trim();
            if(!miSala || !miEquipo) return alert("Faltan datos");

            const palabra = banco[Math.floor(Math.random()*banco.length)];
            await set(ref(db, `sesiones/${miSala}`), {
                palabra_actual: palabra,
                letras_adivinadas: [""],
                errores: 0,
                estado: "jugando",
                jugadores: {[miEquipo]: true},
                orden_turnos: [miEquipo],
                turno_index: 0
            });
            iniciarJuego();
        };

        document.getElementById('btn-unir').onclick = async () => {
            miSala = document.getElementById('in-sala').value.trim().toLowerCase();
            miEquipo = document.getElementById('in-equipo').value.trim();
            const s = await get(ref(db, `sesiones/${miSala}`));
            if(!s.exists()) return alert("Sala no existe");
            
            let d = s.val();
            let jug = d.jugadores || {};
            jug[miEquipo] = true;
            await update(ref(db, `sesiones/${miSala}`), {
                jugadores: jug,
                orden_turnos: Object.keys(jug).sort()
            });
            iniciarJuego();
        };

        function iniciarJuego() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('pantalla-juego').classList.add('activa');
            onValue(ref(db, `sesiones/${miSala}`), (snap) => {
                miData = snap.val();
                if(!miData) return;
                render();
            });
            prepararReto();
        }

        function render() {
            // Dibujar Palabra con soporte multilínea
            const box = document.getElementById('display-palabra');
            box.innerHTML = "";
            miData.palabra_actual.split("").forEach(letra => {
                const span = document.createElement('span');
                span.innerText = miData.letras_adivinadas.includes(letra) ? letra : "_";
                box.appendChild(span);
            });

            document.getElementById('lbl-errores').innerText = `Errores: ${miData.errores}/6`;
            dibujar(miData.errores);

            const miTurno = miData.orden_turnos[miData.turno_index] === miEquipo;
            const tBox = document.getElementById('display-turno');
            tBox.innerText = miTurno ? "🎯 TU TURNO" : `Espera a: ${miData.orden_turnos[miData.turno_index]}`;
            tBox.className = "turn-box " + (miTurno ? "mi-turno" : "");

            actualizarTeclado(miTurno);
        }

        function prepararReto() {
            const r = retos[Math.floor(Math.random()*retos.length)];
            document.getElementById('txt-pregunta').innerText = r.q;
            document.getElementById('txt-pregunta').dataset.a = r.a;
            document.getElementById('in-ans').value = "";
            document.getElementById('caja-reto').style.display = "block";
            document.getElementById('caja-teclado').style.display = "none";
        }

        document.getElementById('btn-check').onclick = () => {
            if(document.getElementById('in-ans').value == document.getElementById('txt-pregunta').dataset.a) {
                sonido.exito();
                document.getElementById('caja-reto').style.display = "none";
                document.getElementById('caja-teclado').style.display = "block";
            } else {
                sonido.error();
                alert("Incorrecto");
                prepararReto();
            }
        };

        function actualizarTeclado(activo) {
            const t = document.getElementById('teclado');
            t.innerHTML = "";
            "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement('button');
                b.className = "k-btn"; b.innerText = l;
                b.disabled = !activo || miData.letras_adivinadas.includes(l);
                b.onclick = () => {
                    const acierto = miData.palabra_actual.includes(l);
                    if(acierto) sonido.exito(); else sonido.error();
                    
                    let nIndex = miData.turno_index;
                    if(!acierto) nIndex = (nIndex + 1) % miData.orden_turnos.length;

                    update(ref(db, `sesiones/${miSala}`), {
                        letras_adivinadas: [...miData.letras_adivinadas, l],
                        errores: miData.errores + (acierto ? 0 : 1),
                        turno_index: nIndex
                    });
                    prepararReto();
                    切换Tab('tablero');
                };
                t.appendChild(b);
            });
        }

        function dibujar(e) {
            ctx.clearRect(0,0,200,180);
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 3;
            ctx.beginPath(); 
            ctx.moveTo(10,170); ctx.lineTo(100,170); // Base
            ctx.moveTo(30,170); ctx.lineTo(30,10); ctx.lineTo(80,10); ctx.lineTo(80,30);
            ctx.stroke();
            if(e>0) { ctx.beginPath(); ctx.arc(80,45,15,0,7); ctx.stroke(); } // Cabeza
            if(e>1) { ctx.beginPath(); ctx.moveTo(80,60); ctx.lineTo(80,110); ctx.stroke(); } // Cuerpo
            if(e>2) { ctx.beginPath(); ctx.moveTo(80,75); ctx.lineTo(60,100); ctx.stroke(); } // Brazo L
            if(e>3) { ctx.beginPath(); ctx.moveTo(80,75); ctx.lineTo(100,100); ctx.stroke(); } // Brazo R
            if(e>4) { ctx.beginPath(); ctx.moveTo(80,110); ctx.lineTo(60,140); ctx.stroke(); } // Pierna L
            if(e>5) { ctx.beginPath(); ctx.moveTo(80,110); ctx.lineTo(100,140); ctx.stroke(); } // Pierna R
        }
    </script>
</body>
</html>
